<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #map { width: 100%; height: 100%; overflow: hidden; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map', { zoomControl: false })
                   .setView([10.7585, 106.7042], 15);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        var poiMarkers = [];
        var userMarker = null;
        var heatLayer = null;

        function addPOIs(pois) {
            poiMarkers.forEach(function(m) { map.removeLayer(m); });
            poiMarkers = [];

            var icon = L.divIcon({
                html: '<svg viewBox="0 0 24 34" width="28" height="38" xmlns="http://www.w3.org/2000/svg">'
                    + '<path d="M12 1C6.5 1 2 5.5 2 11c0 7.5 10 22 10 22s10-14.5 10-22c0-5.5-4.5-10-10-10z"'
                    + ' fill="#FF4444" stroke="white" stroke-width="1.5"/>'
                    + '<circle cx="12" cy="11" r="4" fill="white"/></svg>',
                iconSize: [28, 38],
                iconAnchor: [14, 38],
                className: ''
            });

            pois.forEach(function(poi) {
                var marker = L.marker([poi.lat, poi.lng], { icon: icon }).addTo(map);
                marker.on('click', function() {
                    window.location.href = 'mapaction://pinclicked?name=' + encodeURIComponent(poi.name);
                });
                poiMarkers.push(marker);
            });
        }

        function centerOn(lat, lng, zoom) {
            map.setView([lat, lng], zoom || 16);
        }

        function updateUserLocation(lat, lng) {
            if (!userMarker) {
                var userIcon = L.divIcon({
                    html: '<div style="width:16px;height:16px;background:#4285F4;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.5)"></div>',
                    iconSize: [16, 16],
                    iconAnchor: [8, 8],
                    className: ''
                });
                userMarker = L.marker([lat, lng], { icon: userIcon, zIndexOffset: 1000 }).addTo(map);
            } else {
                userMarker.setLatLng([lat, lng]);
            }
        }

        // Hiển thị heatmap với data [{lat, lng, weight}]
        // Quán phổ biến hơn tạo vùng nhiệt rộng hơn và sẫm hơn,
        // giúp nó trực quan "lấn át" quán kém nổi tiếng khi hai vùng giao nhau.
        function showHeatmap(points) {
            if (heatLayer) {
                map.removeLayer(heatLayer);
                heatLayer = null;
            }

            var maxWeight = 1;
            points.forEach(function(p) { if (p.weight > maxWeight) maxWeight = p.weight; });

            var heatData = [];
            points.forEach(function(p) {
                var normalized = p.weight > 0 ? (p.weight / maxWeight) : 0;
                // Luỹ thừa 1.5 khuếch đại khoảng cách giữa quán hot và quán bình thường,
                // khiến quán ưu tiên cao chiếm màu đỏ/cam còn quán thấp hơn chỉ hiện xanh nhạt.
                var w = Math.max(0.1, Math.pow(normalized, 1.5));
                heatData.push([p.lat, p.lng, w]);

                // Thêm điểm vệ tinh để tạo vùng nhiệt rộng hơn cho quán phổ biến.
                // Khi hai quán giao nhau, quán hot sẽ "đẩy" màu đỏ vào vùng giao,
                // trực quan cho thấy đây là địa điểm được ưu tiên hơn.
                var d = 0.00018; // ~20 m
                if (normalized >= 0.7) {
                    heatData.push([p.lat + d, p.lng,     w * 0.55]);
                    heatData.push([p.lat - d, p.lng,     w * 0.55]);
                    heatData.push([p.lat,     p.lng + d, w * 0.55]);
                    heatData.push([p.lat,     p.lng - d, w * 0.55]);
                } else if (normalized >= 0.35) {
                    var d2 = 0.00012; // ~13 m
                    heatData.push([p.lat + d2, p.lng + d2, w * 0.45]);
                    heatData.push([p.lat - d2, p.lng - d2, w * 0.45]);
                }
            });

            heatLayer = L.heatLayer(heatData, {
                radius: 42,
                blur: 32,
                maxZoom: 17,
                gradient: { 0.1: '#4575b4', 0.4: '#74add1', 0.65: '#fee090', 0.85: '#f46d43', 1.0: '#d73027' }
            }).addTo(map);
        }

        // Ẩn heatmap
        function hideHeatmap() {
            if (heatLayer) {
                map.removeLayer(heatLayer);
                heatLayer = null;
            }
        }
    </script>
</body>
</html>
