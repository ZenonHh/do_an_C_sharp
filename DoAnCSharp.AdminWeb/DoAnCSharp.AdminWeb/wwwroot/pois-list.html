<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danh Sách Quán - Vĩnh Khánh Tour</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #2c3e50;
            font-size: 32px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .device-badge {
            background: #dcfce7;
            color: #16a34a;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            border: 2px solid #16a34a;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .header p {
            color: #7f8c8d;
            font-size: 16px;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #4f46e5;
        }

        .stat-item .label {
            color: #7f8c8d;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .stat-item .value {
            color: #4f46e5;
            font-size: 24px;
            font-weight: bold;
            margin-top: 8px;
        }

        .pois-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .poi-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .poi-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.15);
        }

        .poi-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
            overflow: hidden;
        }

        .poi-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .poi-content {
            padding: 20px;
        }

        .poi-name {
            font-size: 20px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .poi-address {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .poi-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
            padding: 12px 0;
            border-top: 1px solid #ecf0f1;
            border-bottom: 1px solid #ecf0f1;
        }

        .poi-stat {
            text-align: center;
        }

        .poi-stat-label {
            color: #95a5a6;
            font-size: 12px;
            font-weight: 600;
        }

        .poi-stat-value {
            color: #4f46e5;
            font-size: 18px;
            font-weight: bold;
            margin-top: 5px;
        }

        .poi-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: #4f46e5;
            color: white;
        }

        .btn-primary:hover {
            background: #3f3cc7;
            transform: scale(1.02);
        }

        .btn-secondary {
            background: #e0e7ff;
            color: #4f46e5;
        }

        .btn-secondary:hover {
            background: #c7d2fe;
        }

        .btn-regenerate {
            background: #f59e0b;
            color: white;
        }

        .btn-regenerate:hover {
            background: #d97706;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top-color: currentColor;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border-radius: 8px;
            padding: 16px 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .notification.success {
            border-left: 4px solid #10b981;
        }

        .notification.info {
            border-left: 4px solid #4f46e5;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 12px;
            margin-top: 30px;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-state h2 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .modal-content h3 {
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .qr-code-container {
            margin: 20px 0;
        }

        .qr-code-container img {
            width: 100%;
            max-width: 250px;
            border: 3px solid #4f46e5;
            border-radius: 8px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .modal-actions .btn-primary {
            background: #4f46e5;
            color: white;
        }

        .modal-actions .btn-cancel {
            background: #ecf0f1;
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>
                🍴 Danh Sách Quán Ăn
                <span class="device-badge" id="deviceBadge">
                    <span class="loading-spinner"></span> Kết nối...
                </span>
            </h1>
            <p>Chọn quán ăn để xem thông tin chi tiết</p>

            <!-- Stats Bar -->
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="label">📍 Tổng Quán</div>
                    <div class="value" id="totalPois">0</div>
                </div>
                <div class="stat-item">
                    <div class="label">📱 Thiết Bị Online</div>
                    <div class="value" id="devicesOnline">1</div>
                </div>
                <div class="stat-item">
                    <div class="label">🔊 Lượt Nghe Hôm Nay</div>
                    <div class="value" id="scansToday">0</div>
                </div>
            </div>
        </div>

        <!-- POIs Grid -->
        <div class="pois-grid" id="poisGrid">
            <div style="grid-column: 1/-1; text-align: center; padding: 40px;">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </div>

    <!-- QR Code Modal -->
    <div class="modal" id="qrModal">
        <div class="modal-content">
            <h3>Mã QR của quán</h3>
            <div class="qr-code-container" id="qrContainer"></div>
            <p id="qrInfo" style="color: #7f8c8d; font-size: 14px; margin: 15px 0;"></p>
            <div class="modal-actions">
                <button class="btn-primary" onclick="regenerateQR()">🔄 Tái Tạo</button>
                <button class="btn-cancel" onclick="closeQRModal()">Đóng</button>
            </div>
        </div>
    </div>

    <script>
        let currentPoiId = null;
        let currentPoiQRCode = null;
        let deviceId = getOrCreateDeviceId();

        // Get or create device ID
        function getOrCreateDeviceId() {
            let id = localStorage.getItem('pois_list_device_id');
            if (!id) {
                id = 'DEVICE_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('pois_list_device_id', id);
            }
            return id;
        }

        // Track device access
        function trackDeviceAccess() {
            fetch('/api/devices/track', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    deviceId: deviceId,
                    deviceInfo: getDeviceInfo(),
                    accessPoint: 'pois-list'
                })
            }).catch(e => console.error('Track device error:', e));
        }

        function getDeviceInfo() {
            const ua = navigator.userAgent;
            if (ua.includes('Android')) return 'Android Device';
            if (ua.includes('iPhone') || ua.includes('iPad')) return 'iOS Device';
            if (ua.includes('Windows')) return 'Windows PC';
            if (ua.includes('Mac')) return 'Mac';
            return 'Unknown Device';
        }

        // Show notification
        function showNotification(message, type = 'info') {
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.textContent = message;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        // Load POIs list
        async function loadPOIs() {
            try {
                const response = await fetch('/api/pois');
                const pois = await response.json();

                const grid = document.getElementById('poisGrid');
                
                if (!pois || pois.length === 0) {
                    grid.innerHTML = `
                        <div style="grid-column: 1/-1;">
                            <div class="empty-state">
                                <div class="empty-state-icon">🏪</div>
                                <h2>Chưa có quán nào</h2>
                                <p>Vui lòng thêm quán ăn từ Admin Dashboard</p>
                            </div>
                        </div>
                    `;
                    return;
                }

                document.getElementById('totalPois').textContent = pois.length;
                grid.innerHTML = pois.map(poi => `
                    <div class="poi-card">
                        <div class="poi-image">
                            ${poi.imageUrl ? `<img src="${poi.imageUrl}" alt="${poi.name}">` : '🍴'}
                        </div>
                        <div class="poi-content">
                            <div class="poi-name">${poi.name}</div>
                            <div class="poi-address">
                                📍 ${poi.address || 'Chưa cập nhật'}
                            </div>
                            <div class="poi-stats">
                                <div class="poi-stat">
                                    <div class="poi-stat-label">Lượt Nghe</div>
                                    <div class="poi-stat-value">${poi.scanCount || 0}</div>
                                </div>
                                <div class="poi-stat">
                                    <div class="poi-stat-label">Rating</div>
                                    <div class="poi-stat-value">⭐ ${poi.rating || 5}</div>
                                </div>
                            </div>
                            <div class="poi-actions">
                                <button class="btn btn-primary" onclick="viewPOI(${poi.id})">
                                    👁️ Xem Chi Tiết
                                </button>
                                <button class="btn btn-regenerate" onclick="showQRModal(${poi.id}, '${poi.qrCode}')">
                                    🔗 QR Code
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');

                // Track this access
                trackDeviceAccess();
                showNotification(`✅ ${getDeviceInfo()} đã truy cập danh sách quán`, 'info');
            } catch (error) {
                console.error('Load POIs error:', error);
                const grid = document.getElementById('poisGrid');
                grid.innerHTML = `
                    <div style="grid-column: 1/-1;">
                        <div class="empty-state">
                            <div class="empty-state-icon">❌</div>
                            <h2>Không thể tải dữ liệu</h2>
                            <p>${error.message}</p>
                        </div>
                    </div>
                `;
            }
        }

        // View POI details
        function viewPOI(poiId) {
            window.location.href = `/poi-public.html?poiId=${poiId}&fromList=true`;
        }

        // Show QR Modal
        function showQRModal(poiId, qrCode) {
            currentPoiId = poiId;
            currentPoiQRCode = qrCode;
            
            const qrContainer = document.getElementById('qrContainer');
            const qrInfo = document.getElementById('qrInfo');
            
            qrContainer.innerHTML = `<img src="/api/qr/image?code=${qrCode}" alt="QR Code">`;
            qrInfo.textContent = `Mã: ${qrCode}`;
            
            document.getElementById('qrModal').classList.add('active');
        }

        // Close QR Modal
        function closeQRModal() {
            document.getElementById('qrModal').classList.remove('active');
        }

        // Regenerate QR
        async function regenerateQR() {
            if (!currentPoiId) return;
            
            try {
                const response = await fetch(`/api/pois/${currentPoiId}/qr/regenerate`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    currentPoiQRCode = data.qrCode;
                    showNotification('✅ QR Code đã được tái tạo', 'success');
                    showQRModal(currentPoiId, data.qrCode);
                } else {
                    showNotification('❌ Lỗi tái tạo QR', 'error');
                }
            } catch (error) {
                showNotification(`❌ ${error.message}`, 'error');
            }
        }

        // Update device count
        async function updateDeviceCount() {
            try {
                const response = await fetch('/api/devices/online-count');
                const data = await response.json();
                document.getElementById('devicesOnline').textContent = data.count || 1;
            } catch (error) {
                console.error('Update device count error:', error);
            }
        }

        // Update scans today
        async function updateScansToday() {
            try {
                const response = await fetch('/api/qr/scans-today');
                const data = await response.json();
                document.getElementById('scansToday').textContent = data.count || 0;
            } catch (error) {
                console.error('Update scans today error:', error);
            }
        }

        // Update device badge
        function updateDeviceBadge() {
            const badge = document.getElementById('deviceBadge');
            const ua = navigator.userAgent;
            let device = 'Unknown';
            
            if (ua.includes('Android')) device = '📱 Android';
            else if (ua.includes('iPhone') || ua.includes('iPad')) device = '📱 iPhone';
            else if (ua.includes('Windows')) device = '💻 Windows';
            else if (ua.includes('Mac')) device = '🍎 Mac';
            
            badge.textContent = `🟢 ${device} Online`;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateDeviceBadge();
            loadPOIs();
            updateDeviceCount();
            updateScansToday();
            
            // Refresh every 5 seconds
            setInterval(updateDeviceCount, 5000);
            setInterval(updateScansToday, 5000);
        });

        // Close modal on outside click
        document.getElementById('qrModal').addEventListener('click', (e) => {
            if (e.target.id === 'qrModal') {
                closeQRModal();
            }
        });
    </script>
</body>
</html>
